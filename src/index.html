<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豆沙 (Dousha) - AI漫剧制作系统</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入谷歌字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- 侧边导航栏 -->
        <nav class="sidebar glass-panel">
            <div class="logo">
                <h2>豆沙</h2>
                <span class="version">v1.0</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tab="projects">项目管理</li>
                <li data-tab="settings">全局设置</li>
            </ul>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 创作台视图 -->
            <section id="studio-view" class="view-section glass-panel">
                <!-- 顶部: 项目/集选择导航栏 -->
                <header class="view-header" style="justify-content: space-between; flex-shrink: 0;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button id="btn-back-from-studio" class="primary-btn" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); margin-right: 8px;">&larr; 返回</button>
                        <div style="font-size: 13px; color: var(--text-muted); white-space: nowrap;">当前工作层:</div>
                        <span id="studio-breadcrumb" style="color: var(--primary-color); font-weight: 600;">未选择项目</span>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <button id="btn-add-shot" class="primary-btn" style="background:rgba(255,255,255,0.1); font-size:13px; padding: 6px 14px;">➕ 添加镜头</button>
                        <button id="btn-batch-execute" class="accent-btn" style="font-size:13px; padding: 6px 14px;">批量执行</button>
                        <button id="btn-open-script-modal" class="primary-btn" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);"><span style="margin-right:4px;">📝</span>剧本源文本</button>
                    </div>
                    <div id="studio-no-episode" style="font-size: 13px; color: var(--text-muted);">请先在「项目管理」中建立项目并进入集创作台</div>
                </header>

                <!-- 资产验证警告栏 (当有缺失资产时显示) -->
                <div id="asset-validation-bar" style="display:none; background: rgba(231, 76, 60, 0.15); border: 1px solid rgba(231, 76, 60, 0.4); border-radius: 8px; padding: 10px 16px; margin: 0 0 12px; font-size: 13px; color: #e74c3c;">
                    ⚠️ <span id="asset-validation-msg"></span>
                </div>

                <!-- 主创作区: 只有镜头流，剧本变成弹窗 -->
                <div class="studio-layout" style="flex: 1; overflow: hidden;">
                    <!-- 右侧: 镜头执行流 -->
                    <div class="shots-panel inner-panel" style="display: flex; flex-direction: column; width: 100%;">
                        <!-- <div class="shots-header" removed as buttons moved to top> -->
                        <div id="shots-list" class="shots-list" style="flex:1; overflow-y: auto;">
                            <div class="empty-state">尚无分镜数据，请先手动添加或者通过源文本生成</div>
                        </div>
                    </div>
                </div>

                <!-- 剧本模态弹窗 -->
                <div id="subview-script-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center;">
                    <div style="background: rgba(20,20,35,0.96); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 32px 36px; min-width: 680px; max-width: 800px; height: 80vh; display: flex; flex-direction: column; box-shadow: 0 24px 60px rgba(0,0,0,0.6);">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                            <div style="display:flex; align-items:center; gap: 12px;">
                                <h2 style="margin:0; font-size: 18px;">剧本源文本</h2>
                                <span id="studio-ep-tag" style="font-size: 12px; color: var(--primary-color); background: rgba(58,134,255,0.1); padding: 3px 10px; border-radius: 20px;"></span>
                            </div>
                            <button id="btn-close-script-modal" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px;">× 关闭</button>
                        </div>
                        
                        <textarea id="script-input" placeholder="请将剧本内容粘贴到此处...&#10;如未配置全局 API Key 则拆解功能不可用" style="flex:1; width: 100%; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-family: inherit; resize: none;"></textarea>
                        
                        <div style="display:flex; justify-content: space-between; align-items: flex-end; flex-shrink: 0; gap: 16px;">
                            <div style="flex: 1;">
                                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 8px;">
                                    <h4 style="margin:0; font-size:13px; color: var(--text-muted); font-weight:500;">本集引用资产 (@)</h4>
                                    <button id="btn-validate-assets" class="primary-btn" style="font-size:11px; padding: 4px 10px; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color);">检测缺失</button>
                                </div>
                                <div id="episode-assets-view" style="font-size: 12px; color: var(--text-muted); padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; min-height: 40px; max-height: 80px; overflow-y: auto;">
                                    暂无资产引用 (@资产名)
                                </div>
                            </div>
                            
                            <div style="display:flex; gap: 8px;">
                                <button id="btn-save-script" class="primary-btn" style="background:rgba(255,255,255,0.1); min-width: 100px;">💾 保存</button>
                                <button id="btn-decompose" class="primary-btn" style="background: var(--primary-color); min-width: 160px;">✨ AI一键拆解</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 项目管理与资产视图 -->
            <section id="projects-view" class="view-section active glass-panel">
                <!-- 项目列表界面 -->
                <div id="project-list-section" style="display: flex; flex-direction: column; height: 100%;">
                    <header class="view-header">
                        <h2>项目库管理</h2>
                        <div>
                            <button id="btn-show-create-project" class="accent-btn">新建工程</button>
                        </div>
                    </header>

                    <div class="studio-layout" style="flex-direction: column; overflow-y: auto;">
                        <!-- 项目列表展示区 -->
                        <div class="inner-panel" style="margin-bottom: 20px;">
                            <h3>所有项目</h3>
                            <div id="project-list-container"
                                style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px;">
                                <!-- 项目列表项将被注入此处 -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 具体项目内页区 (默认隐藏) -->
                <div id="project-edit-section" style="display: none; flex-direction: column; height: 100%; position: relative;">
                    
                    <!-- 【新主界面】：集管理 (Episodes) -->
                    <div id="project-episodes-view" style="display: flex; flex-direction: column; height: 100%;">
                        <header class="view-header" style="justify-content: space-between; display: flex;">
                            <div style="display: flex; align-items: center; gap: 16px;">
                                <button id="btn-back-to-projects" class="primary-btn"
                                    style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">&larr;
                                    返回</button>
                                <h2>当前项目: <span id="label-active-project" style="color:var(--primary-color)">未加载</span></h2>
                            </div>
                            <div style="display: flex; gap: 12px;">
                                <button id="btn-open-proj-settings" class="primary-btn" style="background: rgba(255,255,255,0.1);">⚙️ 参数设置</button>
                                <button id="btn-open-proj-assets" class="primary-btn" style="background: rgba(255,255,255,0.1);">📁 资产库</button>
                                <button id="btn-show-create-episode" class="primary-btn">➕ 新建集</button>
                            </div>
                        </header>

                        <div class="studio-layout" style="flex-direction: column; overflow-y: auto;">
                            <div class="inner-panel" style="flex: 1;">
                                <h3 style="margin-bottom: 16px;">本项目集列表</h3>
                                <div id="episodes-list-container" style="display: flex; flex-direction: column; gap: 12px;">
                                    <!-- JS 渲染的集卡片列表 -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 【悬浮弹窗】：项目默认呈现参数 -->
                    <div id="subview-proj-settings" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; align-items: center; justify-content: center;">
                        <div style="background: rgba(20,20,35,0.96); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 32px 36px; min-width: 480px; max-width: 580px; box-shadow: 0 24px 60px rgba(0,0,0,0.6);">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 28px;">
                                <h2 style="margin:0; font-size: 18px;">项目默认参数设置</h2>
                                <button id="btn-close-proj-settings" style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: #fff; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px;">× 关闭</button>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 20px;">
                                <div>
                                    <label style="display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: 500;">默认横竖比</label>
                                    <select id="proj-default-ratio" style="width: 100%;">
                                        <option value="16:9">横屏 16:9</option>
                                        <option value="9:16">竖屏 9:16</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: 500;">默认引擎模型</label>
                                    <select id="proj-default-model" style="width: 100%;">
                                        <option value="Seedance 2.0 Fast">Seedance 2.0 Fast</option>
                                        <option value="Seedance 2.0">Seedance 2.0</option>
                                    </select>
                                </div>
                                <div>
                                    <label style="display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: 500;">默认镜头时长</label>
                                    <select id="proj-default-duration" style="width: 100%;">
                                        <option value="4s">4秒</option>
                                        <option value="5s">5秒</option>
                                        <option value="6s">6秒</option>
                                        <option value="7s">7秒</option>
                                        <option value="8s">8秒</option>
                                        <option value="9s">9秒</option>
                                        <option value="10s">10秒</option>
                                        <option value="11s">11秒</option>
                                        <option value="12s">12秒</option>
                                        <option value="13s">13秒</option>
                                        <option value="14s">14秒</option>
                                        <option value="15s">15秒</option>
                                    </select>
                                </div>
                            </div>
                            <div style="margin-top: 28px; display: flex; justify-content: flex-end;">
                                <button id="btn-save-proj-settings" class="accent-btn" style="min-width: 120px;">保存设置</button>
                            </div>
                        </div>
                    </div>

                    <!-- 【二级页面】：项目工程资产库 -->
                    <div id="subview-proj-assets" style="display: none; flex-direction: column; position: absolute; top:0; left:0; width:100%; height:100%; background: var(--bg-color); z-index: 10; padding: 24px;">
                        <div style="display: flex; align-items: center; margin-bottom: 24px;">
                            <button id="btn-close-proj-assets" class="primary-btn" style="background: transparent; border: 1px solid rgba(255,255,255,0.2); margin-right: 16px;">&larr; 返回</button>
                            <h2 style="margin: 0;">工程库资产池</h2>
                        </div>
                        <div class="inner-panel" style="flex: 1; display: flex; flex-direction: column;">
                            <!-- 资产分类选项卡 -->
                            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                                <button class="primary-btn tab-asset active" data-type="protagonist" style="background: rgba(58, 134, 255, 0.2); border: 1px solid var(--primary-color)">主角</button>
                                <button class="primary-btn tab-asset" data-type="supporting" style="background: rgba(255,255,255,0.1);">配角</button>
                                <button class="primary-btn tab-asset" data-type="scene" style="background: rgba(255,255,255,0.1);">场景</button>
                                <button class="primary-btn tab-asset" data-type="prop" style="background: rgba(255,255,255,0.1);">道具</button>
                            </div>

                            <!-- 拖拽上传区 -->
                            <div id="asset-dropzone" style="border: 2px dashed rgba(255,255,255,0.2); border-radius: 8px; padding: 20px; text-align: center; margin-bottom: 20px; color: var(--text-muted); cursor: pointer; transition: all 0.3s; background: rgba(0,0,0,0.2);">
                                <div style="font-size: 14px;">将图片拖拽至此，或点击选择文件</div>
                                <div style="font-size: 12px; margin-top: 4px; opacity: 0.6;">文件将归档至当前选中的分类</div>
                            </div>
                            
                            <input type="file" id="asset-upload-input" accept="image/*" multiple style="display: none;" />
                            <input type="file" id="audio-upload-input" accept="audio/mpeg,audio/wav,audio/*" style="display: none;" />

                            <!-- 资产网格 -->
                            <div id="assets-grid" class="assets-grid"
                                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 16px; overflow-y: auto; align-content: flex-start; flex: 1;">
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 设置视图 -->
            <section id="settings-view" class="view-section glass-panel">
                <header class="view-header">
                    <h2>全局设置与引擎鉴权</h2>
                </header>
                <div class="settings-form inner-panel">
                    <div class="form-group">
                        <label>Gemini API Endpoint (直连/代理)</label>
                        <input type="text" id="setting-api-url"
                            value="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" />
                    </div>
                    <div class="form-group">
                        <label>Gemini API Key</label>
                        <input type="password" id="setting-api-key" placeholder="AI-12345xxxxx..." />
                    </div>
                    <div class="form-group">
                        <label>剧本拆解 Prompt 系统词</label>
                        <textarea id="setting-master-prompt" rows="8"></textarea>
                    </div>
                    <button id="btn-save-settings" class="primary-btn">保存系统配置</button>
                </div>
            </section>
        </main>
    </div>

    <!-- 简易模态框: 新建/重命名项目 -->
    <div id="project-modal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center;">
        <div class="glass-panel" style="width: 400px; padding: 24px;">
            <h3 id="modal-title" style="margin-bottom: 16px;">新建项目</h3>
            <input type="text" id="modal-input-name" placeholder="请输入项目名称..." style="margin-bottom: 16px;">
            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button id="btn-modal-cancel"
                    style="background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted);">取消</button>
                <button id="btn-modal-confirm" class="primary-btn">确定</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
