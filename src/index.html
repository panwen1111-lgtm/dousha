<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豆沙 (Dousha) - AI漫剧制作系统</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入谷歌字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- 侧边导航栏 -->
        <nav class="sidebar glass-panel">
            <div class="logo">
                <h2>豆沙</h2>
                <span class="version">v1.0</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-tab="studio">创作台</li>
                <li data-tab="projects">项目管理</li>
                <li data-tab="settings">全局设置</li>
            </ul>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 创作台视图 -->
            <section id="studio-view" class="view-section active glass-panel">
                <header class="view-header">
                    <div class="project-selector">
                        <select id="current-project">
                            <option value="">载入工程中...</option>
                        </select>
                        <select id="current-episode">
                            <option value="">选择集数...</option>
                        </select>
                    </div>
                </header>
                <div class="studio-layout">
                    <!-- 左侧剧本拆解区 -->
                    <div class="script-panel inner-panel">
                        <h3>剧本源文本</h3>
                        <textarea id="script-input" placeholder="请粘贴完整的漫剧剧本..."></textarea>
                        <button id="btn-decompose" class="primary-btn">一键AI拆解镜号</button>
                    </div>
                    <!-- 右侧镜头执行列表区 -->
                    <div class="shots-panel inner-panel">
                        <div class="shots-header">
                            <h3>分镜执行流</h3>
                            <button id="btn-batch-execute" class="accent-btn">全局批量静默执行</button>
                        </div>
                        <div id="shots-list" class="shots-list">
                            <!-- JS 动态渲染镜头卡片项 -->
                            <div class="empty-state">尚无分镜数据</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 项目管理与资产视图 -->
            <section id="projects-view" class="view-section glass-panel">
                <!-- 项目列表界面 -->
                <div id="project-list-section" style="display: flex; flex-direction: column; height: 100%;">
                    <header class="view-header">
                        <h2>项目库管理</h2>
                        <div>
                            <button id="btn-show-create-project" class="accent-btn">新建工程</button>
                        </div>
                    </header>

                    <div class="studio-layout" style="flex-direction: column; overflow-y: auto;">
                        <!-- 项目列表展示区 -->
                        <div class="inner-panel" style="margin-bottom: 20px;">
                            <h3>所有项目</h3>
                            <div id="project-list-container"
                                style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px;">
                                <!-- 项目列表项将被注入此处 -->
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 项目内页界面 (默认隐藏) -->
                <div id="project-edit-section" style="display: none; flex-direction: column; height: 100%;">
                    <header class="view-header">
                        <div style="display: flex; align-items: center; gap: 16px;">
                            <button id="btn-back-to-projects" class="primary-btn"
                                style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">&larr;
                                返回列表</button>
                            <h2>项目属性及资产: <span id="label-active-project" style="color:var(--primary-color)">未加载</span>
                            </h2>
                        </div>
                        <div>
                            <button class="accent-btn"
                                onclick="document.querySelector('[data-tab=\'studio\']').click()">前往创作台编辑本集</button>
                        </div>
                    </header>

                    <div class="studio-layout" style="flex-direction: column; overflow-y: auto;">
                        <!-- 项目全局设定 -->
                        <div class="inner-panel" style="margin-bottom: 20px;">
                            <h3>项目默认呈现参数</h3>
                            <div style="display: flex; gap: 20px; margin-top: 16px;">
                                <div style="flex: 1;">
                                    <label
                                        style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">默认横竖比</label>
                                    <select id="proj-default-ratio">
                                        <option value="16:9">横屏 16:9</option>
                                        <option value="9:16">竖屏 9:16</option>
                                    </select>
                                </div>
                                <div style="flex: 1;">
                                    <label
                                        style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">默认引擎模型</label>
                                    <select id="proj-default-model">
                                        <option value="Seedance 2.0 Fast">Seedance 2.0 Fast</option>
                                        <option value="Seedance 2.0">Seedance 2.0</option>
                                    </select>
                                </div>
                                <div style="flex: 1;">
                                    <label
                                        style="display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted);">默认镜头时长</label>
                                    <select id="proj-default-duration">
                                        <option value="4s">4秒 (标准)</option>
                                        <option value="5s">5秒</option>
                                        <option value="10s">10秒</option>
                                        <option value="15s">15秒 (长镜头)</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- 资产管理池 -->
                        <div class="inner-panel" style="flex: 1; display: flex; flex-direction: column;">
                            <h3 style="margin-bottom: 16px;">工程库资产池 (用于提示词内 @ 验证)</h3>
                            <div style="display: flex; gap: 12px; margin-bottom: 20px;">
                                <button class="primary-btn"
                                    style="background: rgba(255,255,255,0.1); border: 1px solid var(--primary-color)">上传人设(图片)</button>
                                <button class="primary-btn" style="background: rgba(255,255,255,0.1);">上传场景(图片)</button>
                                <button class="primary-btn" style="background: rgba(255,255,255,0.1);">上传道具(图片)</button>
                                <button class="primary-btn"
                                    style="background: rgba(255,255,255,0.1);">上传音色(mp3)</button>
                            </div>

                            <!-- 资产网格 -->
                            <div class="assets-grid"
                                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; overflow-y: auto;">
                                <!-- Mock Data -->
                                <div
                                    style="background: rgba(0,0,0,0.4); border-radius: 8px; padding: 8px; text-align: center;">
                                    <div
                                        style="height: 80px; background: #333; border-radius: 4px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666;">
                                        图片预览</div>
                                    <span style="font-size: 12px; color: var(--accent-color);">[人设]</span>
                                    <div style="font-size: 13px; margin-top: 4px;">男主林峰</div>
                                </div>
                                <div
                                    style="background: rgba(0,0,0,0.4); border-radius: 8px; padding: 8px; text-align: center;">
                                    <div
                                        style="height: 80px; background: #333; border-radius: 4px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666;">
                                        图片预览</div>
                                    <span style="font-size: 12px; color: var(--primary-color);">[场景]</span>
                                    <div style="font-size: 13px; margin-top: 4px;">废弃飞船</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 设置视图 -->
            <section id="settings-view" class="view-section glass-panel">
                <header class="view-header">
                    <h2>全局设置与引擎鉴权</h2>
                </header>
                <div class="settings-form inner-panel">
                    <div class="form-group">
                        <label>Gemini API Endpoint (直连/代理)</label>
                        <input type="text" id="setting-api-url"
                            value="https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" />
                    </div>
                    <div class="form-group">
                        <label>Gemini API Key</label>
                        <input type="password" id="setting-api-key" placeholder="AI-12345xxxxx..." />
                    </div>
                    <div class="form-group">
                        <label>剧本拆解 Prompt 系统词</label>
                        <textarea id="setting-master-prompt" rows="8"></textarea>
                    </div>
                    <button id="btn-save-settings" class="primary-btn">保存系统配置</button>
                </div>
            </section>
        </main>
    </div>

    <!-- 简易模态框: 新建/重命名项目 -->
    <div id="project-modal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center;">
        <div class="glass-panel" style="width: 400px; padding: 24px;">
            <h3 id="modal-title" style="margin-bottom: 16px;">新建项目</h3>
            <input type="text" id="modal-input-name" placeholder="请输入项目名称..." style="margin-bottom: 16px;">
            <div style="display: flex; justify-content: flex-end; gap: 12px;">
                <button id="btn-modal-cancel"
                    style="background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted);">取消</button>
                <button id="btn-modal-confirm" class="primary-btn">确定</button>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
